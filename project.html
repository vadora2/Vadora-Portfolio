<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Vadora Tang</title>

  <style>
    :root {
      --cream: #F6F5EE;
      --ice: #DCEEEE;
      --aqua: #B9DFE1;
      --teal: #5EA8AC;
      --dark: #111111;
      --cyan: #00A6C8;
      --red: #E8503A;
      --orange: #F5A623;
      --radius: 14px;
      --shadow: 0 2px 12px rgba(0,0,0,0.10);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
      --mono: "Courier New", Courier, monospace;
      --serif: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --body: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--cream);
      color: var(--dark);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;
      padding-bottom: 112px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    nav.dock-nav {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 100;
      width: max-content;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.22s ease;
    }

    .dock-nav.is-scrolling {
      transform: translateX(-50%) scale(0.965);
    }

    .dock-back-btn {
      box-shadow: 0 14px 38px rgba(0,0,0,0.18);
    }

    .section-wrap {
      width: min(1080px, calc(100% - 48px));
      margin: 0 auto;
    }

    .sticker {
      display: inline-block;
      background: var(--teal);
      color: white;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 4px;
      transform: rotate(-2deg);
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      width: fit-content;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--teal);
      background: var(--ice);
      border: 1px solid var(--aqua);
      border-radius: 999px;
      padding: 3px 8px;
    }

    .btn {
      display: inline-block;
      border: 1.5px solid var(--dark);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      transition: all 0.18s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: var(--cyan);
      color: white;
      border-color: var(--cyan);
    }

    .window-bar {
      height: 42px;
      background: linear-gradient(180deg, #f6f6f6 0%, #e5e5e5 100%);
      border-bottom: 1px solid #d0d0d0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .red { background: #FF5F57; }
    .yellow { background: #FFBD2E; }
    .green { background: #28CA41; }

    .window-title {
      margin-left: 6px;
      color: #555;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
    }

    .project-hero {
      padding-top: 86px;
      padding-bottom: 28px;
    }

    .hero-window {
      background: white;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }

    .hero-image {
      min-height: 430px;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,166,200,0.18), transparent 30%),
        radial-gradient(circle at 70% 65%, rgba(232,80,58,0.18), transparent 30%),
        linear-gradient(135deg, var(--ice), var(--aqua));
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
      color: var(--teal);
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .hero-image.has-image {
      color: transparent;
    }

    .project-intro {
      padding: 24px 0 54px;
    }

    .intro-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 32px;
      align-items: start;
    }

    .project-title {
      font-family: var(--serif);
      font-size: clamp(38px, 7vw, 76px);
      line-height: 0.96;
      letter-spacing: -0.055em;
      text-transform: uppercase;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .project-subtitle {
      color: #555;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .project-description {
      max-width: 720px;
      font-size: 18px;
      line-height: 1.6;
      color: #242424;
    }

    .details-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #999;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 13px;
      line-height: 1.4;
    }

    .content-section {
      background: var(--ice);
      padding: 66px 0;
    }

    .content-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-bottom: 34px;
    }

    .text-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .text-card h3 {
      color: var(--teal);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--aqua);
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .text-card p {
      color: #333;
      font-size: 14px;
      line-height: 1.55;
    }

    .hmw-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 28px;
      margin-bottom: 24px;
    }

    .hmw-eyebrow {
      display: inline-block;
      color: var(--teal);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--aqua);
      padding-bottom: 5px;
      margin-bottom: 14px;
    }

    .hmw-card h2 {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.035em;
      margin-bottom: 10px;
    }

    .hmw-card p {
      max-width: 880px;
      font-size: 20px;
      line-height: 1.5;
      color: #242424;
    }

    .wide-card {
      background: white;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      margin-top: 22px;
    }

    .wide-card-body {
      padding: 26px;
    }

    .wide-card h2 {
      font-family: var(--serif);
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .wide-card p {
      color: #444;
      max-width: 780px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px;
      margin-top: 28px;
    }

    .image-slot {
      min-height: 420px;
      background: linear-gradient(135deg, #ffffff, var(--aqua));
      border: 1px solid #ddd;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      text-align: center;
      color: rgba(17,17,17,0.45);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background-size: cover;
      background-position: center;
    }

    .image-slot.has-image {
      color: transparent;
    }

    .image-slot.is-hidden {
      display: none;
    }

    .image-slot.contain-image {
      background-size: contain;
      background-repeat: no-repeat;
      background-color: white;
    }

    .image-slot.has-video {
      padding: 0;
      background: #111;
      color: inherit;
      align-items: stretch;
      justify-content: stretch;
    }

    .image-slot video {
      width: 100%;
      height: 100%;
      min-height: 420px;
      object-fit: contain;
      display: block;
      background: #111;
    }

    .image-slot.pdf-preview {
      min-height: 420px;
      padding: 0;
      background: white;
      color: inherit;
      display: block;
      text-align: left;
      text-transform: none;
      letter-spacing: normal;
    }

    .pdf-preview iframe {
      width: 100%;
      height: 360px;
      border: 0;
      display: block;
      background: white;
    }

    .pdf-preview-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 16px;
      border-top: 1px solid #e5e5e5;
      background: #fafafa;
    }

    .pdf-preview-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
    }

    .pdf-preview-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .project-actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .report-btn {
      background: var(--dark);
      color: white;
    }

    .report-btn:hover {
      background: var(--cyan);
      border-color: var(--cyan);
    }

    .image-slot.video-slot {
      position: relative;
      cursor: pointer;
    }

    .image-slot.video-slot::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.28);
    }

    .video-link {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: white;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .video-play {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      color: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      padding-left: 4px;
      box-shadow: var(--shadow-lg);
    }

    .video-label {
      background: rgba(0,0,0,0.45);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 10px;
    }

    .next-section {
      background: var(--cream);
      padding: 44px 0 70px;
      text-align: center;
    }

    footer {
      background: var(--dark);
      color: rgba(255,255,255,0.55);
      text-align: center;
      padding: 22px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
    }

    .not-found {
      padding-top: 120px;
      min-height: 72vh;
      text-align: center;
    }

    .not-found h1 {
      font-family: var(--serif);
      font-size: clamp(34px, 6vw, 68px);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 12px;
    }

    .not-found p {
      color: #555;
      margin-bottom: 24px;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }

      .dock-nav,
      .dock-nav.is-scrolling {
        transition: none !important;
      }
    }

    @media (max-width: 820px) {
      body {
        padding-bottom: 104px;
      }

      nav.dock-nav {
        bottom: 16px;
        width: auto;
        max-width: calc(100% - 22px);
        padding: 8px 10px;
        border-radius: 999px;
      }

      .section-wrap {
        width: min(100% - 32px, 1080px);
      }

      .hero-image {
        min-height: 260px;
      }

      .intro-grid,
      .content-grid,
      .image-grid {
        grid-template-columns: 1fr;
      }

      .project-description {
        font-size: 16px;
      }

      .image-slot,
      .image-slot.pdf-preview {
        min-height: 480px;
      }

      .image-slot video {
        min-height: 480px;
      }

      .pdf-preview iframe {
        height: 420px;
      }

      .pdf-preview-bar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getProjectSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("project") || "dqueue";
    }

    function setBackgroundImage(element, imagePath) {
      if (!element || !imagePath) return;
      element.style.backgroundImage = `url('${imagePath}')`;
      element.classList.add("has-image");
    }

    function getYouTubeId(url) {
      const value = String(url);

      const shortMatch = value.match(/youtu\.be\/([^?&]+)/);
      if (shortMatch) return shortMatch[1];

      const longMatch = value.match(/[?&]v=([^?&]+)/);
      if (longMatch) return longMatch[1];

      return "";
    }

    function setGalleryMedia(element, mediaPath) {
      if (!element || !mediaPath) {
        if (element) element.remove();
        return;
      }

      const value = String(mediaPath);
      const lowerValue = value.toLowerCase();
      const isYouTube = lowerValue.includes("youtu.be") || lowerValue.includes("youtube.com");
      const isMp4 = lowerValue.endsWith(".mp4");
      const isPdf = lowerValue.endsWith(".pdf");
      const shouldContain = lowerValue.includes("floorplan") || lowerValue.includes("axo") || lowerValue.includes("diagram") || lowerValue.includes("plan");

      if (isPdf) {
        element.classList.add("pdf-preview");
        element.innerHTML = `
          <iframe
            src="${escapeHTML(value)}"
            title="PDF slide deck preview"
            loading="lazy">
          </iframe>

          <div class="pdf-preview-bar">
            <span class="pdf-preview-title">PDF deck preview</span>

            <div class="pdf-preview-actions">
              <a class="btn" href="${escapeHTML(value)}" target="_blank" rel="noopener">
                Open PDF
              </a>
            </div>
          </div>
        `;

        return;
      }

      if (isYouTube) {
        const videoId = getYouTubeId(value);
        const thumbnail = videoId ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg` : "";

        if (thumbnail) {
          element.style.backgroundImage = `url('${thumbnail}')`;
          element.classList.add("has-image", "video-slot");
        }

        element.innerHTML = `
          <a class="video-link" href="${escapeHTML(value)}" target="_blank" rel="noopener" aria-label="Open project video">
            <span class="video-play">▶</span>
            <span class="video-label">Watch project video</span>
          </a>
        `;

        return;
      }

      if (isMp4) {
        element.classList.add("has-video");
        element.innerHTML = `
          <video controls muted playsinline preload="metadata">
            <source src="${escapeHTML(value)}" type="video/mp4">
            Your browser does not support the video tag.
          </video>
        `;

        return;
      }

      const testImage = new Image();

      testImage.onload = () => {
        element.style.backgroundImage = `url('${value}')`;
        element.classList.add("has-image");

        if (shouldContain) {
          element.classList.add("contain-image");
        }
      };

      testImage.onerror = () => {
        element.remove();
      };

      testImage.src = value;
    }

    function inferHMW(project) {
      if (project.hmw || project.howMightWe) return project.hmw || project.howMightWe;

      const title = project.title || "this project";
      const category = String(project.category || "").toLowerCase();

      if (category.includes("ux") || category.includes("app")) {
        return `How might we make ${title} easier, clearer, and more useful for its target users?`;
      }

      if (category.includes("web")) {
        return `How might we communicate ${title} in a clearer and more engaging digital experience?`;
      }

      if (category.includes("game") || category.includes("vr") || category.includes("interactive")) {
        return `How might we use interaction, pacing, and environment design to make ${title} more immersive?`;
      }

      if (category.includes("product")) {
        return `How might we design ${title} as a practical, user-centred system that responds to real constraints?`;
      }

      return `How might we frame ${title} as a clear design response to a real user, context, or storytelling need?`;
    }

    function renderProject(project, slug) {
      document.title = `${project.title} — Vadora Tang`;

      const hmwValue = inferHMW(project);

        <section class="project-intro">

            <aside class="details-card">

                <div class="detail-value">${escapeHTML(project.title)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Category</div>
                <div class="detail-value">${escapeHTML(project.category)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Duration</div>
                <div class="detail-value">${escapeHTML(project.duration)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Role</div>
                <div class="detail-value">${escapeHTML(project.role)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Tools</div>
                <div class="detail-value">${escapeHTML(project.tools)}</div>
              </div>
              ${project.reportFile ? `
                <div class="project-actions">
                  <a class="btn report-btn" href="${escapeHTML(project.reportFile)}" download>
                    ↓ ${escapeHTML(project.reportLabel || "Download report")}
                  </a>
                </div>
              ` : ""}
            </aside>
          </div>
        </section>

        <section class="content-section">
          <div class="section-wrap">
            <article class="hmw-card">
              <span class="hmw-eyebrow">${escapeHTML(framingEyebrow)}</span>
              <h2>${escapeHTML(framingTitle)}</h2>
              <p>${escapeHTML(hmwValue)}</p>
            </article>

            <div class="content-grid">
              <article class="text-card">
                <h3>Challenge</h3>
                <p>${escapeHTML(challengeValue)}</p>
              </article>

              <article class="text-card">
                <h3>Approach</h3>
                <p>${escapeHTML(approachValue)}</p>
              </article>

              <article class="text-card">
                <h3>Outcome</h3>
                <p>${escapeHTML(outcomeValue)}</p>
              </article>
            </div>

            <div class="wide-card">
              <div class="window-bar">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="window-title">project images</span>
              </div>
              <div class="wide-card-body">
                <h2>${escapeHTML(galleryTitle)}</h2>
                ${galleryDescription ? `<p>${escapeHTML(galleryDescription)}</p>` : ""}

                <div class="image-grid">
                  ${(project.images || [])
                    .filter(Boolean)
                    .map((_, index) => `
                      <div class="image-slot" id="galleryImage${index}">Image slot ${String(index + 1).padStart(2, "0")}</div>
                    `)
                    .join("")}
                </div>
              </div>
            </div>
          </div>
        </section>
      `;
    }

    function renderNotFound(slug) {
      return `
        <section class="not-found">
          <div class="section-wrap">
            <h1>Project not found</h1>
            <p>No project page exists for <strong>${escapeHTML(slug)}</strong> yet. Check the slug in PROJECTS inside project.html.</p>
          </div>
        </section>
      `;
    }

    const slug = getProjectSlug();
    const project = PROJECTS[slug];
    const app = document.getElementById("app");

    if (!project) {
      app.innerHTML = renderNotFound(slug);
    } else {
      app.innerHTML = renderProject(project, slug);
      setBackgroundImage(document.getElementById("heroImage"), project.heroImage);
      (project.images || []).forEach((mediaPath, index) => {
        setGalleryMedia(document.getElementById(`galleryImage${index}`), mediaPath);
      });
    }

    const dockNav = document.querySelector(".dock-nav");
    let dockTimer;

    window.addEventListener("scroll", () => {
      if (!dockNav) return;

      dockNav.classList.add("is-scrolling");
      clearTimeout(dockTimer);
      dockTimer = setTimeout(() => dockNav.classList.remove("is-scrolling"), 180);
    }, { passive: true });
  </script>
