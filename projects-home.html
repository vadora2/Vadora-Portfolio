  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/projects-home.css" />
</head>

<body>
  <nav class="dock-nav" aria-label="Main navigation">
    <a href="index.html#home" class="nav-link" aria-label="Home">
      <span class="dock-icon">🏠</span>
      <span class="dock-label">home</span>
    </a>
    <a href="projects-home.html" class="nav-link active" aria-label="Projects">
      <span class="dock-icon">📁</span>
      <span class="dock-label">projects</span>
    </a>
    <a href="index.html#about" class="nav-link" aria-label="About">
      <span class="dock-icon">👤</span>
      <span class="dock-label">about</span>
    </a>
    <a href="index.html#resume" class="nav-link" aria-label="Resume">
      <span class="dock-icon">📄</span>
      <span class="dock-label">resume</span>
    </a>
    <a href="index.html#contact" class="nav-link" aria-label="Contact">
      <span class="dock-icon">✉️</span>
      <span class="dock-label">contact</span>
    </a>
  </nav>

  <main>
    <section id="projects" class="projects-home-section">
      <div class="container archive-container">
        <span class="archive-folder-tag">FOLDER: PROJECTS</span>

        <div class="archive-heading-row">
          <h1 class="section-heading">Projects</h1>
          <a href="index.html#projects" class="btn primary archive-back-btn" aria-label="Back to homepage projects section">
            ← Back to Home
          </a>
        </div>
        <p class="section-sub">
          A full archive of design, interaction, development, game, spatial, and visual projects.
        </p>

        <div class="finder-window">
          <div class="window-bar">
            <div class="window-dots" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>

            <nav class="window-title archive-tabs" id="archiveCategoryTabs" aria-label="Project categories">
              <!-- Category tabs are generated by projects-home.js -->
            </nav>
          </div>

          <div class="finder-body">
            <div class="archive-intro-row">
              <h2 class="category-title archive-main-title">Some of my work!</h2>
              <p class="category-note">click a category tab to jump through the full archive</p>
            </div>

            <div id="projectsArchive" aria-label="All projects">
              <!-- Project categories and cards are generated by projects-home.js -->
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    © 2025 Vadora Tang — project archive
  </footer>

  <script src="js/projects-data.js"></script>
