      --ice: #DCEEEE;

      --orange: #F5A623;
      --radius: 14px;

      margin: 0;
      padding: 0;
    }

    html {

    }

      font-size: 15px;
      line-height: 1.65;
      overflow-x: hidden;

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: 44px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(246,245,238,0.84);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--aqua);
    }

    .nav-name {
      margin-right: auto;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.05em;
      color: var(--teal);
      padding: 5px 11px;
      border-radius: 999px;
      transition: background 0.18s, color 0.18s;
    }

    .nav-link:hover {
      background: var(--aqua);
      color: var(--dark);
    }

    .section-wrap {
      width: min(1080px, calc(100% - 48px));
      margin: 0 auto;
    }

    .sticker {
      display: inline-block;
      background: var(--teal);
      color: white;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 4px;
      transform: rotate(-2deg);
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      width: fit-content;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--teal);
      background: var(--ice);
      border: 1px solid var(--aqua);
      border-radius: 999px;
      padding: 3px 8px;
    }

      display: inline-block;
      border: 1.5px solid var(--dark);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      transition: all 0.18s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .btn.primary {
      background: var(--cyan);
      color: white;
      border-color: var(--cyan);
    }

      height: 42px;
      background: linear-gradient(180deg, #f6f6f6 0%, #e5e5e5 100%);
      border-bottom: 1px solid #d0d0d0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;

      height: 12px;
      border-radius: 50%;
      display: inline-block;

      font-size: 11px;

      }

        font-size: 16px;
      }
    }
  </style>
</head>

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getProjectSlug() {
      const params = new URLSearchParams(window.location.search);
      return params.get("project") || "dqueue";
    }

    function setBackgroundImage(element, imagePath) {
      if (!element || !imagePath) return;
      element.style.backgroundImage = `url('${imagePath}')`;
      element.classList.add("has-image");
    }

    function renderProject(project, slug) {
      document.title = `${project.title} — Vadora Tang`;

      return `
        <section class="project-hero">
          <div class="section-wrap">
            <div class="hero-window">
              <div class="window-bar">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="window-title">${escapeHTML(slug)}.html</span>
              </div>
              <div class="hero-image" id="heroImage">
                ${escapeHTML(project.heroLabel || "Add hero image in the project data")}
              </div>
            </div>
          </div>
        </section>

        <section class="project-intro">
          <div class="section-wrap intro-grid">
            <div>
              <span class="sticker">${escapeHTML(project.category)}</span>
              <h1 class="project-title">${escapeHTML(project.title)}</h1>
              <p class="project-subtitle">${escapeHTML(project.subtitle)}</p>
              <p class="project-description">${escapeHTML(project.description)}</p>
            </div>

            <aside class="details-card">
              <div class="detail-row">
                <div class="detail-label">Project</div>
                <div class="detail-value">${escapeHTML(project.title)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Category</div>
                <div class="detail-value">${escapeHTML(project.category)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Duration</div>
                <div class="detail-value">${escapeHTML(project.duration)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Role</div>
                <div class="detail-value">${escapeHTML(project.role)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Tools</div>
                <div class="detail-value">${escapeHTML(project.tools)}</div>
              </div>
              <div class="detail-row">
                <div class="detail-label">Year</div>
                <div class="detail-value">${escapeHTML(project.year)}</div>
              </div>
            </aside>
          </div>
        </section>

        <section class="content-section">
          <div class="section-wrap">
            <div class="content-grid">
              <article class="text-card">
                <h3>Brief</h3>
                <p>${escapeHTML(project.brief)}</p>
              </article>

              <article class="text-card">
                <h3>Process</h3>
                <p>${escapeHTML(project.process)}</p>
              </article>

              <article class="text-card">
                <h3>Outcome</h3>
                <p>${escapeHTML(project.outcome)}</p>
              </article>
            </div>

            <div class="wide-card">
              <div class="window-bar">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="window-title">project images</span>
              </div>
              <div class="wide-card-body">
                <h2>Visual documentation</h2>
                <p>Add process shots, final renders, sketches, interface screens, event photos, or diagrams here.</p>

                <div class="image-grid">
                  <div class="image-slot" id="galleryImageOne">Image slot 01</div>
                  <div class="image-slot" id="galleryImageTwo">Image slot 02</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="next-section">
          <div class="section-wrap">
            <a href="index.html#projects" class="btn primary">← Back to Projects</a>
          </div>
        </section>
      `;
    }

    function renderNotFound(slug) {
      return `
        <section class="not-found">
          <div class="section-wrap">
            <h1>Project not found</h1>
            <p>No project page exists for <strong>${escapeHTML(slug)}</strong> yet. Check the slug in PROJECTS inside project.html.</p>
            <a href="index.html#projects" class="btn primary">← Back to Projects</a>
          </div>
        </section>
      `;
    }

    const slug = getProjectSlug();
    const project = PROJECTS[slug];
    const app = document.getElementById("app");

    if (!project) {
      app.innerHTML = renderNotFound(slug);
    } else {
      app.innerHTML = renderProject(project, slug);
      setBackgroundImage(document.getElementById("heroImage"), project.heroImage);
      setBackgroundImage(document.getElementById("galleryImageOne"), project.images && project.images[0]);
      setBackgroundImage(document.getElementById("galleryImageTwo"), project.images && project.images[1]);
    }
  </script>
</body>
